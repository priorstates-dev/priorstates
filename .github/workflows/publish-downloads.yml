name: publish-downloads (manual re-mirror)

# MANUAL re-mirror of an EXISTING GitHub Release to priorstates.com/download/
# with the stable aliases (priorstates-latest.*, PriorStates-Setup.exe), then a
# link-verify gate. The normal tag-push release already mirrors automatically
# (see the `mirror-downloads` job in release.yml); use THIS only to re-publish an
# older release, or to mirror after first adding the deploy secrets.
#
# Gated on two repo secrets; SKIPS cleanly if they aren't set:
#   DOWNLOADS_DEPLOY_KEY   private SSH key for the download host (its .pub goes in
#                          the box's ~/.ssh/authorized_keys — a dedicated CI key)
#   DOWNLOADS_HOST         e.g.  ubuntu@<download-host>
#
# The website never needs redeploying — download.html links the stable aliases,
# which this repoints at the chosen release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'release tag to mirror (e.g. v0.1.17)'
        required: true

permissions:
  contents: read           # download release assets

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DEPLOY_KEY: ${{ secrets.DOWNLOADS_DEPLOY_KEY }}
      DL_HOST: ${{ secrets.DOWNLOADS_HOST }}
    steps:
      - name: guard — skip if deploy secrets are not configured
        id: g
        run: |
          if [ -z "$DEPLOY_KEY" ] || [ -z "$DL_HOST" ]; then
            echo "DOWNLOADS_DEPLOY_KEY / DOWNLOADS_HOST not set — skipping /download/ publish."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.g.outputs.go == 'true'
        uses: actions/checkout@v4
        with:
          # Check out the released tag so the pyproject version that
          # publish-downloads.sh reads matches the assets it's mirroring.
          ref: ${{ inputs.tag }}

      - name: download release assets → build/ layout
        if: steps.g.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          mkdir -p build/windows dl
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dl
          shopt -s nullglob
          for f in dl/*; do
            case "$f" in
              *.exe)                       mv "$f" build/windows/ ;;
              *.tar.gz|*.deb|*.rpm|*.pkg)  mv "$f" build/ ;;
            esac
          done
          echo "staged:"; ls -R build

      - name: install deploy key
        if: steps.g.outputs.go == 'true'
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/dl_key
          chmod 600 ~/.ssh/dl_key

      - name: publish to /download/ (+ stable aliases + SHA256SUMS)
        if: steps.g.outputs.go == 'true'
        run: |
          export SSH_OPTS="-i $HOME/.ssh/dl_key -o StrictHostKeyChecking=accept-new"
          bash packaging/publish-downloads.sh "$DL_HOST"

      - name: verify links resolve (release gate)
        if: steps.g.outputs.go == 'true'
        run: |
          fail=0
          for p in priorstates-latest.deb priorstates-latest.noarch.rpm \
                   priorstates-latest.tar.gz priorstates-latest.pkg \
                   PriorStates-Setup.exe SHA256SUMS; do
            code="$(curl -s -o /dev/null -w '%{http_code}' -IL "https://priorstates.com/download/$p")"
            echo "  $p -> $code"; [ "$code" = 200 ] || fail=1
          done
          [ "$fail" = 0 ] || { echo "::error::some /download/ links are not 200"; exit 1; }
